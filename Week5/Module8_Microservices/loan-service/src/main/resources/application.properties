# This is my loan microservice
# Running on port 8082 separate from account service
server.port=8082
spring.application.name=loan-service

# Loan service has its OWN database - separate from account service
# This is important in microservices - each service has its own database
spring.datasource.url=jdbc:h2:mem:loandb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
