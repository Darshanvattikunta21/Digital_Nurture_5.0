# This is my account microservice
# It runs on port 8081 so it does not clash with loan service
server.port=8081
spring.application.name=account-service

# Using H2 in memory database for testing
spring.datasource.url=jdbc:h2:mem:accountdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console so I can see the database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
